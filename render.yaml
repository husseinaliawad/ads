services:
  - type: web
    name: classifieds
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: classifieds-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: classifieds-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: classifieds-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: classifieds-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: classifieds-db
          property: password
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: classifieds-db
